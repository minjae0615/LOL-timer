<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL 인게임 타임스탬프 스펠 체크 (가독성 업그레이드)</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #0f0f12; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; user-select: none; overflow: hidden; position: relative; }
        
        /* [좌측 상단] 게임 시간 컨트롤러 */
        .game-clock-container { position: absolute; top: 15px; left: 15px; background: rgba(20, 20, 25, 0.95); padding: 10px 14px; border-radius: 8px; border: 1px solid #4c4c55; display: flex; align-items: center; gap: 8px; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .game-clock-label { font-size: 12px; color: #ffcd00; font-weight: bold; letter-spacing: 0.5px; }
        .game-time-input { width: 65px; background: #25252b; color: #ffcd00; border: 1px solid #666; border-radius: 4px; font-size: 14px; text-align: center; font-weight: bold; padding: 4px; }
        .clock-btn { padding: 5px 10px; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background: #3d4461; color: #fff; transition: background 0.1s; }
        .clock-btn:hover { background: #4d567d; }
        .clock-btn.running { background: #d92b36; }

        /* 알림창 */
        .left-toast { position: absolute; top: 65px; left: 15px; color: #ff9900; font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.85); padding: 6px 12px; border-radius: 4px; border-left: 4px solid #ff9900; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10; }

        /* 메인 컨테이너 */
        .main-wrapper { background-color: #16161a; padding: 16px; border-radius: 12px; border: 1px solid #323238; box-shadow: 0 15px 40px rgba(0,0,0,0.6); width: 95%; max-width: 900px; box-sizing: border-box; margin-top: 50px; }
        .flex-container { display: flex; flex-direction: column; gap: 12px; }
        
        /* 라인별 가로 행 */
        .lane-row { display: flex; align-items: center; background-color: #1f1f25; border: 1px solid #3c3c46; border-radius: 8px; padding: 10px 16px; gap: 14px; min-width: 0; transition: background-color 0.2s; }
        .lane-row:hover { background-color: #24242c; }
        .lane-title { width: 50px; font-size: 16px; font-weight: 900; color: #ffcd00; text-align: center; flex-shrink: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        /* 챔피언 입력창 */
        .champ-input { width: 90px; padding: 7px; background: #2a2a32; color: #fff; border: 1px solid #5c5c66; border-radius: 6px; font-size: 13px; text-align: center; font-weight: bold; flex-shrink: 0; }
        .champ-input:focus { border-color: #ffcd00; outline: none; background-color: #31313a; }
        
        /* 체크박스 옵션 */
        .options { display: flex; flex-direction: column; gap: 5px; font-size: 12px; font-weight: bold; color: #aaa; background: #151519; padding: 8px 10px; border-radius: 6px; width: 80px; flex-shrink: 0; box-sizing: border-box; }
        .options label { display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap; }
        .options label:hover { color: #fff; }
        
        /* 스펠 및 궁극기 박스 구조 */
        .spell-container { display: flex; gap: 10px; flex-grow: 1; align-items: center; min-width: 0; }
        .slot-box { text-align: center; background: #111114; padding: 8px; border-radius: 6px; border: 1px solid #2d2d35; display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .ult-box { flex: 1.4; background: #162238; border-color: #354a6b; }
        
        .select-input-group { display: flex; gap: 4px; justify-content: center; width: 100%; }
        .spell-select { width: 100%; padding: 5px; background: #32323a; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 13px; cursor: pointer; min-width: 0; font-weight: bold; }
        .spell-select:focus { border-color: #ffcd00; }
        .ult-cooldown-input { width: 32%; max-width: 42px; padding: 4px 2px; background: #222228; color: #ffcd00; border: 1px solid #555; border-radius: 4px; font-size: 12px; text-align: center; font-weight: bold; }
        
        /* 버튼 스타일 */
        .action-btn { width: 100%; padding: 8px 0; font-size: 13px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; background-color: #2e354d; color: #f0e6d2; border: 1px solid #464f73; transition: all 0.1s; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .action-btn:hover { background-color: #3e4766; color: #fff; }
        .action-btn.active { background-color: #c8232c; color: white; border-color: #ff4d52; font-size: 14px; font-weight: 900; letter-spacing: 0.5px; }
        .ult-box .action-btn { background-color: #1c3559; border-color: #2b5185; }
        .ult-box .action-btn:hover { background-color: #254473; }
        .ult-box .action-btn.active { background-color: #c8232c; border-color: #ff4d52; }
        
        /* 🔥 [핵심 수정] 타이머 숫자 극대화 스타일 */
        .timer-display { font-size: 20px; font-weight: 900; color: #00ffcc; height: 26px; line-height: 26px; text-align: center; white-space: nowrap; letter-spacing: 1px; text-shadow: 0 0 8px rgba(0, 255, 204, 0.4); margin-top: 2px; }
        .timer-display.running { font-size: 22px; color: #ff4d52; text-shadow: 0 0 10px rgba(255, 77, 82, 0.5); font-family: 'Courier New', Courier, monospace; }
        
        /* 궁극기 레벨 라디오 */
        .ult-levels { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; background: #111115; padding: 3px 6px; border-radius: 4px; margin-bottom: 2px; width: 100%; box-sizing: border-box; border: 1px solid #2d2d35; }
        .ult-levels label { display: flex; align-items: center; gap: 3px; cursor: pointer; color: #999; }
        .ult-levels input-radio { cursor: pointer; }
        .ult-levels input[type="radio"]:checked + span, .ult-levels label:has(input:checked) { color: #ffcd00; }
    </style>
</head>

        function getGameTimeSeconds() {
            if (!gameStartTime) return gameTimeOffset;
            return Math.floor((Date.now() - gameStartTime) / 1000) + gameTimeOffset;
        }

        function formatSecondsToMMSS(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatToOrderTime(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}${s.toString().padStart(2, '0')}`;
        }

        function parseMMSSToSeconds(str) {
            if(str.includes(':')) {
                const parts = str.split(':');
                return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
            }
            return parseInt(str) || 0;
        }

        function toggleGameClock() {
            const btn = document.getElementById('gameClockToggleBtn');
            if (gameStartTime) {
                gameTimeOffset = getGameTimeSeconds();
                gameStartTime = null;
                clearInterval(gameClockInterval);
                gameClockInterval = null;
                btn.innerText = "시작";
                btn.classList.remove('running');

                gameTimeOffset = parseMMSSToSeconds(inputVal);
                gameStartTime = Date.now();
                btn.innerText = "중지";
                btn.classList.add('running');
                gameClockInterval = setInterval(() => {
                    document.getElementById('gameClockInput').value = formatSecondsToMMSS(getGameTimeSeconds());
                }, 1000);
            }
        }

            const inputVal = document.getElementById('gameClockInput').value;

            if (gameStartTime) gameStartTime = Date.now();
            showLeftToast(`🕒 게임 시간 동기화: ${formatSecondsToMMSS(gameTimeOffset)}`);

                if(parts[1] === 'ult') tickUlt(parts[0]);
                else tick(parts[0], parseInt(parts[1]));

                    <label><input type="checkbox" id="shoes-${lane.id}" onchange="onOptionChange('${lane.id}')"> 쿨감신</label>
                </div>
                <div class="spell-container">
            `;

            for (let i = 0; i < 2; i++) {
                const defaultSpell = lane.default[i];
                html += `
                    <div class="slot-box">
                        <div class="select-input-group">
                            <select class="spell-select" id="select-${lane.id}-${i}" onchange="onSpellSelectChange('${lane.id}', ${i})">
                                ${Object.keys(spellRegistry).map(name => `<option value="${name}" ${name === defaultSpell ? 'selected' : ''}>${name}</option>`).join('')}
                            </select>
                        </div>
                        <button class="action-btn" id="btn-${lane.id}-${i}" onclick="handleSpellClick('${lane.id}', ${i})">시작</button>
                        <div class="timer-display" id="timer-${lane.id}-${i}">READY</div>
                    </div>
                `;
            }

            html += `
                <div class="slot-box ult-box">
                    <div class="ult-levels">
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-6" value="6" checked onchange="onOptionChange('${lane.id}')"><span>6</span></label>
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-11" value="11" onchange="onOptionChange('${lane.id}')"><span>11</span></label>
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-16" value="16" onchange="onOptionChange('${lane.id}')"><span>16</span></label>
                    </div>
                    <div class="select-input-group">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-6" value="120" onchange="onOptionChange('${lane.id}')">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-11" value="100" onchange="onOptionChange('${lane.id}')">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-16" value="80" onchange="onOptionChange('${lane.id}')">
                    </div>
                    <button class="action-btn" id="btn-${lane.id}-ult" onclick="handleUltClick('${lane.id}')">궁극기</button>
                    <div class="timer-display" id="timer-${lane.id}-ult">READY</div>
                </div>
            `;

            html += `</div>`;
            row.innerHTML = html;
            app.appendChild(row);
            
            onSpellSelectChange(lane.id, 0);
            onSpellSelectChange(lane.id, 1);
        });

        function getTargetGameTime(laneId, slotIndex, type) {
            if (type === 'spell') {
                const timer = activeTimers[`${laneId}-${slotIndex}`];
                const hasUtong = document.getElementById(`utong-${laneId}`).checked;
                const hasShoes = document.getElementById(`shoes-${laneId}`).checked;
                const finalCooldown = Math.ceil(timer.baseSec * getSpellModifier(hasUtong, hasShoes));
                return timer.triggeredAtGameTime + finalCooldown;
            } else {
                const timer = activeTimers[`${laneId}-ult`];
                let selectedLvl = "6";
                if (document.getElementById(`ultlvl-${laneId}-11`).checked) selectedLvl = "11";
                if (document.getElementById(`ultlvl-${laneId}-16`).checked) selectedLvl = "16";
                const baseSec = parseInt(document.getElementById(`ultbase-${laneId}-${selectedLvl}`).value) || 0;
                const hasShoes = document.getElementById(`shoes-${laneId}`).checked;
                const finalCooldown = Math.ceil(baseSec * getUltModifier(hasShoes));
                return timer.triggeredAtGameTime + finalCooldown;
            }
        }

        // --- 줄임말 분석 및 자동완성 매핑 엔진 ---
        function autoFillUlt(laneId) {
            const inputField = document.getElementById(`champ-${laneId}`);
            let inputVal = inputField.value.trim().toLowerCase();
            
            if(!inputVal) return;

            // 1. 줄임말 사전에 등록되어 있다면 원본 이름으로 교체
            if (aliasDB[inputVal]) {
                inputVal = aliasDB[inputVal];
                inputField.value = inputVal; // 입력창 텍스트 보정
            }

            // 2. DB에서 쿨타임 데이터 매핑
            if (championUltDB[inputVal]) {
                const cooldowns = championUltDB[inputVal];
                document.getElementById(`ultbase-${laneId}-6`).value = cooldowns[0];
                document.getElementById(`ultbase-${laneId}-11`).value = cooldowns[1];
                document.getElementById(`ultbase-${laneId}-16`).value = cooldowns[2];
                if (activeTimers[`${laneId}-ult`]) tickUlt(laneId);
            }
        }

        function onSpellSelectChange(laneId, slotIndex) {
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            if (!activeTimers[`${laneId}-${slotIndex}`]) {
                btn.innerText = select.value;
            }
        }

        function getSpellModifier(hasUtong, hasShoes) {
            let speed = 0;
            if (hasUtong) speed += 18;
            if (hasShoes) speed += 12;
            return 100 / (100 + speed);
        }

        function getUltModifier(hasShoes) {
            let speed = 0;
            if (hasShoes) speed += 15;
            return 100 / (100 + speed);
        }

        function handleSpellClick(laneId, slotIndex) {
            const timerKey = `${laneId}-${slotIndex}`;
            if (activeTimers[timerKey]) { 
                resetTimer(laneId, slotIndex); 
                return; 
            }
            
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            activeTimers[timerKey] = {
                type: 'spell',
                baseSec: spellRegistry[select.value],
                triggeredAtGameTime: getGameTimeSeconds(),
                intervalId: null
            };
            
            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            btn.classList.add('active');
            
            tick(laneId, slotIndex);
            activeTimers[timerKey].intervalId = setInterval(() => tick(laneId, slotIndex), 1000);
        }

        function handleUltClick(laneId) {
            const timerKey = `${laneId}-ult`;
            if (activeTimers[timerKey]) { 
                resetUltTimer(laneId); 
                return; 
            }

            activeTimers[timerKey] = {
                type: 'ult',
                triggeredAtGameTime: getGameTimeSeconds(),
                intervalId: null
            };

            document.getElementById(`btn-${laneId}-ult`).classList.add('active');

            tickUlt(laneId);
            activeTimers[timerKey].intervalId = setInterval(() => tickUlt(laneId), 1000);
        }

        function onOptionChange(laneId) {
            for (let i = 0; i < 2; i++) {
                if (activeTimers[`${laneId}-${i}`]) tick(laneId, i);
            }
            if (activeTimers[`${laneId}-ult`]) tickUlt(laneId);
        }

        function tick(laneId, slotIndex) {
            const timerKey = `${laneId}-${slotIndex}`;
            const timer = activeTimers[timerKey];
            if (!timer) return;

            const targetGameTime = getTargetGameTime(laneId, slotIndex, 'spell');
            const timeLeft = targetGameTime - getGameTimeSeconds();

            const display = document.getElementById(`timer-${laneId}-${slotIndex}`);
            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            
            if (timeLeft <= 0) {
                resetTimer(laneId, slotIndex);
                display.innerText = "READY";
                display.classList.remove('running');
                display.style.color = "#00ffcc";
            } else {
                const orderText = formatToOrderTime(targetGameTime);
                btn.innerText = orderText; 
                display.innerText = orderText; 
                display.classList.add('running');
            }
        }

        function tickUlt(laneId) {
            const timerKey = `${laneId}-ult`;
            const timer = activeTimers[timerKey];
            if (!timer) return;

            const targetGameTime = getTargetGameTime(laneId, null, 'ult');
            const timeLeft = targetGameTime - getGameTimeSeconds();

            const display = document.getElementById(`timer-${laneId}-ult`);
            const btn = document.getElementById(`btn-${laneId}-ult`);
            
            if (timeLeft <= 0) {
                resetUltTimer(laneId);
                display.innerText = "READY";
                display.classList.remove('running');
                display.style.color = "#00ffcc";
            } else {
                const orderText = formatToOrderTime(targetGameTime);
                btn.innerText = orderText;
                display.innerText = orderText;
                display.classList.add('running');
            }
        }

        function resetTimer(laneId, slotIndex) {
            const timerKey = `${laneId}-${slotIndex}`;
            if (activeTimers[timerKey] && activeTimers[timerKey].intervalId) clearInterval(activeTimers[timerKey].intervalId);
            delete activeTimers[timerKey];

            const btn = document.getElementById('btn-' + laneId + '-' + slotIndex);
            btn.classList.remove('active');
            const display = document.getElementById('timer-' + laneId + '-' + slotIndex);
            display.innerText = "READY";
            display.classList.remove('running');
            display.style.color = "#00ffcc";
            onSpellSelectChange(laneId, slotIndex);
        }

        function resetUltTimer(laneId) {
            const timerKey = `${laneId}-ult`;
            if (activeTimers[timerKey] && activeTimers[timerKey].intervalId) clearInterval(activeTimers[timerKey].intervalId);
            delete activeTimers[timerKey];

            const btn = document.getElementById(`btn-${laneId}-ult`);
            btn.classList.remove('active');
            btn.innerText = "궁극기";
            const display = document.getElementById(`timer-${laneId}-ult`);
            display.innerText = "READY";
            display.classList.remove('running');
            display.style.color = "#00ffcc";
        }
    </script>
</body>
</html>
