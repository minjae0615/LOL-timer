<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL 인게임 타임스탬프 스펠 체크</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #121212; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; user-select: none; overflow: hidden; position: relative; }
        
        /* [좌측 상단] 게임 시간 컨트롤러 */
        .game-clock-container { position: absolute; top: 15px; left: 15px; background: rgba(26, 26, 30, 0.9); padding: 8px 12px; border-radius: 6px; border: 1px solid #3c3c41; display: flex; align-items: center; gap: 6px; z-index: 20; }
        .game-clock-label { font-size: 11px; color: #ffcd00; font-weight: bold; }
        .game-time-input { width: 50px; background: #2b2b2b; color: #ffcd00; border: 1px solid #555; border-radius: 3px; font-size: 12px; text-align: center; font-weight: bold; padding: 2px; }
        .clock-btn { padding: 4px 8px; font-size: 11px; font-weight: bold; border: none; border-radius: 3px; cursor: pointer; background: #3d4461; color: #fff; }
        .clock-btn.running { background: #a31e24; }

        /* 알림창 */
        .left-toast { position: absolute; top: 60px; left: 15px; color: #ff9900; font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; border-left: 3px solid #ff9900; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10; }

        /* 메인 컨테이너 */
        .main-wrapper { background-color: #1a1a1a; padding: 12px; border-radius: 10px; border: 1px solid #2d2d32; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 95%; max-width: 820px; box-sizing: border-box; margin-top: 40px; }
        .flex-container { display: flex; flex-direction: column; gap: 8px; }
        
        /* 라인별 색상 테두리 디자인 */
        .lane-row { display: flex; align-items: center; background-color: #222227; border: 2px solid #3c3c41; border-radius: 6px; padding: 6px 12px; gap: 10px; min-width: 0; }
        .lane-TOP { border-color: #00A86B; } .lane-TOP .lane-title { color: #00A86B; }
        .lane-JGL { border-color: #C2185B; } .lane-JGL .lane-title { color: #C2185B; }
        .lane-MID { border-color: #0057FF; } .lane-MID .lane-title { color: #0057FF; }
        .lane-ADC { border-color: #FF7A00; } .lane-ADC .lane-title { color: #FF7A00; }
        .lane-SUP { border-color: #FFD600; } .lane-SUP .lane-title { color: #FFD600; }

        .lane-title { width: 45px; font-size: 14px; font-weight: bold; text-align: center; flex-shrink: 0; }
        .champ-input { width: 75px; padding: 5px; background: #2e2e34; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 12px; text-align: center; font-weight: bold; flex-shrink: 0; }
        
        .options { display: flex; flex-direction: column; gap: 3px; font-size: 11px; background: #1a1a1e; padding: 5px 8px; border-radius: 4px; width: 70px; flex-shrink: 0; }
        .options label { display: flex; align-items: center; gap: 3px; cursor: pointer; white-space: nowrap; }
        
        .spell-container { display: flex; gap: 8px; flex-grow: 1; align-items: center; }
        .slot-box { text-align: center; background: #151518; padding: 6px; border-radius: 4px; border: 1px solid #2d2d32; display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .ult-box { flex: 1.4; background: #1a2436; border-color: #3b4b66; }
        
        .select-input-group { display: flex; gap: 3px; justify-content: center; width: 100%; }
        .spell-select { width: 100%; padding: 3px; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .ult-cooldown-input { width: 30%; max-width: 36px; padding: 2px; background: #2b2b2b; color: #ffcd00; border: 1px solid #555; border-radius: 3px; font-size: 11px; text-align: center; font-weight: bold; }
        
        .action-btn { width: 100%; padding: 6px 0; font-size: 12px; font-weight: bold; border: 1px solid #464e66; border-radius: 4px; cursor: pointer; background-color: #2d3246; color: #f0e6d2; }
        .action-btn.active { background-color: #a31e24; color: white; border-color: #ff4d52; }
        
        /* 00:00 가독성 개선 */
        .timer-display { font-family: 'Consolas', monospace; font-size: 14px; font-weight: bold; color: #00ffcc; height: 18px; text-align: center; }
        .ult-levels { display: flex; justify-content: space-between; font-size: 10px; background: #222; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="game-clock-container">
        <span class="game-clock-label">GAME TIME</span>
        <input type="text" class="game-time-input" id="gameClockInput" value="00:00">
        <button class="clock-btn" id="gameClockToggleBtn" onclick="toggleGameClock()">시작</button>
        <button class="clock-btn" onclick="syncGameClock()">동기화</button>
    </div>

    <div class="left-toast" id="leftToast"></div>

    <div class="main-wrapper">
        <div class="flex-container" id="app"></div>
    </div>

    <script>
        let gameStartTime = null; let gameTimeOffset = 0; let gameClockInterval = null;
        const championUltDB = { '가렌': [120, 100, 80], '갈리오': [200, 180, 160], '그라가스': [120, 100, 80], '그레이브즈': [120, 90, 60], '나르': [90, 70, 50], '나미': [120, 110, 100], '노틸러스': [140, 110, 80], '녹턴': [140, 115, 90], '누누': [110, 100, 90], '니달리': [3, 3, 3], '다리우스': [120, 100, 80], '다이애나': [100, 90, 80], '드레이븐': [100, 90, 80], '라이즈': [210, 180, 150], '럭스': [60, 50, 40], '럼블': [130, 110, 90], '레오나': [90, 75, 60], '렉사이': [100, 80, 60], '렌가': [110, 100, 90], '루시안': [110, 95, 80], '룰루': [120, 100, 80], '르블랑': [50, 40, 30], '리신': [110, 85, 60], '리븐': [120, 90, 60], '리산드라': [120, 100, 80], '릴리아': [130, 110, 90], '마스터이': [85, 85, 85], '마오카이': [130, 115, 100], '말자하': [140, 110, 80], '말파이트': [130, 105, 80], '모데카이저': [140, 120, 100], '모르가나': [120, 110, 100], '문도박사': [110, 100, 90], '미스포츈': [120, 110, 100], '바드': [110, 95, 80], '바루스': [120, 105, 90], '바이': [120, 90, 60], '베이가': [120, 100, 80], '베인': [100, 85, 70], '벨코즈': [120, 100, 80], '볼리베어': [160, 140, 120], '브라움': [140, 120, 100], '브랜드': [105, 90, 75], '블리츠크랭크': [90, 60, 30], '비에고': [120, 100, 80], '빅토르': [120, 105, 90], '뽀삐': [140, 120, 100], '사미라': [8, 5, 2], '사이온': [140, 115, 90], '사일러스': [100, 70, 40], '샤코': [100, 90, 80], '세나': [160, 140, 120], '세라핀': [160, 140, 120], '세주아니': [130, 115, 100], '세트': [120, 100, 80], '소나': [140, 120, 100], '소라카': [160, 145, 130], '쉔': [200, 180, 160], '쉬바나': [0, 0, 0], '스웨인': [120, 100, 80], '스카너': [140, 120, 100], '시비르': [140, 120, 100], '신짜오': [120, 110, 100], '신드라': [120, 100, 80], '신지드': [120, 120, 120], '쓰레쉬': [140, 120, 100], '아리': [130, 115, 100], '아무무': [150, 125, 100], '아우렐리온솔': [120, 110, 100], '아이번': [140, 120, 100], '아지르': [120, 105, 90], '아칼리': [100, 80, 60], '아크샨': [100, 85, 70], '아트록스': [120, 100, 80], '아펠리오스': [120, 110, 100], '알리스타': [120, 100, 80], '애니': [130, 115, 100], '애니비아': [4, 3, 2], '애쉬': [100, 80, 60], '야스오': [80, 55, 30], '에코': [110, 80, 50], '엘리스': [4, 4, 4], '오공': [120, 105, 90], '오리아나': [110, 95, 80], '오라프': [100, 90, 80], '요네': [120, 100, 80], '요릭': [160, 130, 100], '우고트': [120, 100, 80], '우디르': [6, 6, 6], '워윅': [110, 90, 70], '유미': [130, 110, 90], '이렐리아': [140, 120, 100], '이브린': [120, 100, 80], '이지리얼': [120, 105, 90], '일라오이': [120, 105, 90], '자르반': [120, 105, 90], '자야': [140, 130, 120], '자이라': [130, 115, 100], '자크': [130, 115, 100], '잔나': [120, 110, 100], '잭스': [100, 90, 80], '제드': [120, 100, 80], '제라스': [130, 115, 100], '제이스': [6, 6, 6], '제리': [100, 85, 70], '조이': [11, 8, 5], '직스': [120, 105, 90], '진': [120, 105, 90], '질리언': [120, 90, 60], '징크스': [90, 75, 60], '초가스': [80, 70, 60], '카르마': [40, 37, 34], '카밀': [140, 115, 90], '카사딘': [5, 3.5, 2], '카시오페아': [120, 100, 80], '카이사': [130, 100, 70], '카직': [100, 85, 70], '카타리나': [90, 60, 45], '칼리스타': [150, 120, 90], '케넨': [120, 110, 100], '케이틀린': [90, 75, 60], '케인': [120, 100, 80], '케일': [160, 120, 80], '코그모': [2, 1.5, 1], '코르키': [2, 2, 2], '클레드': [140, 125, 110], '키아나': [120, 105, 90], '킨드레드': [180, 160, 140], '타릭': [180, 160, 140], '탈리아': [180, 150, 120], '탈론': [100, 85, 70], '탐켄치': [120, 100, 80], '트런들': [120, 100, 80], '트리스타나': [120, 110, 100], '트린다미어': [130, 110, 90], '트위스티드페이트': [180, 150, 120], '트위치': [90, 90, 90], '티모': [30, 25, 20], '파이크': [120, 100, 80], '판테온': [180, 165, 150], '피들스틱': [140, 125, 110], '피오라': [110, 90, 70], '피즈': [100, 85, 70], '하이머딩거': [100, 85, 70], '헤카림': [140, 120, 100], '흐웨이': [140, 115, 90] };
        const aliasDB = { '블츠': '블리츠크랭크', '트린': '트린다미어', '트페': '트위스티드페이트', 'gp': '갱플랭크', '블라': '블라디미르' };
        const spellRegistry = { '점멸': 300, '텔포': 360, '점화': 180, '탈진': 210, '정화': 210, '방어막': 180, '회복': 240, '유체화': 240, '강타': 90 };
        const lanes = [
            { id: 'TOP', name: 'TOP', default: ['텔포', '점멸'] }, { id: 'JGL', name: 'JGL', default: ['강타', '점멸'] },
            { id: 'MID', name: 'MID', default: ['텔포', '점멸'] }, { id: 'ADC', name: 'ADC', default: ['방어막', '점멸'] },
            { id: 'SUP', name: 'SUP', default: ['점화', '점멸'] }
        ];
        const activeTimers = {};

        function getGameTimeSeconds() { return !gameStartTime ? gameTimeOffset : Math.floor((Date.now() - gameStartTime) / 1000) + gameTimeOffset; }
        function formatSecondsToMMSS(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`; }
        function formatToOrderTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m.toString().padStart(2, '0')}${sec.toString().padStart(2, '0')}`; }
        function parseMMSSToSeconds(str) { if(str.includes(':')) { const p = str.split(':'); return (parseInt(p[0])||0)*60 + (parseInt(p[1])||0); } return parseInt(str)||0; }

        function toggleGameClock() {
            const btn = document.getElementById('gameClockToggleBtn');
            if(gameStartTime) { gameTimeOffset = getGameTimeSeconds(); gameStartTime = null; clearInterval(gameClockInterval); btn.innerText = "시작"; btn.classList.remove('running'); }
            else { gameTimeOffset = parseMMSSToSeconds(document.getElementById('gameClockInput').value); gameStartTime = Date.now(); btn.innerText = "중지"; btn.classList.add('running'); gameClockInterval = setInterval(() => document.getElementById('gameClockInput').value = formatSecondsToMMSS(getGameTimeSeconds()), 1000); }
        }

        const app = document.getElementById('app');
        lanes.forEach(lane => {
            const row = document.createElement('div');
            row.className = `lane-row lane-${lane.id}`;
            row.innerHTML = `
                <div class="lane-title">${lane.name}</div>
                <input type="text" class="champ-input" id="champ-${lane.id}" onchange="autoFillUlt('${lane.id}')">
                <div class="options">
                    <label><input type="checkbox" id="utong-${lane.id}"> 우통</label>
                    <label><input type="checkbox" id="shoes-${lane.id}"> 쿨감신</label>
                </div>
                <div class="spell-container">
                    ${lane.default.map((s, i) => `
                        <div class="slot-box">
                            <select class="spell-select" id="select-${lane.id}-${i}">${Object.keys(spellRegistry).map(n => `<option value="${n}" ${n===s?'selected':''}>${n}</option>`).join('')}</select>
                            <button class="action-btn" id="btn-${lane.id}-${i}" onclick="handleSpellClick('${lane.id}', ${i})">시작</button>
                            <div class="timer-display" id="timer-${lane.id}-${i}">READY</div>
                        </div>
                    `).join('')}
                    <div class="slot-box ult-box">
                        <div class="ult-levels">
                            ${[6,11,16].map(lvl => `<label><input type="radio" name="ultlvl-${lane.id}" value="${lvl}" ${lvl===6?'checked':''}>${lvl}</label>`).join('')}
                        </div>
                        <div class="select-input-group">${[6,11,16].map(lvl => `<input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-${lvl}" value="120">`).join('')}</div>
                        <button class="action-btn" id="btn-${lane.id}-ult" onclick="handleUltClick('${lane.id}')">궁극기</button>
                        <div class="timer-display" id="timer-${lane.id}-ult">READY</div>
                    </div>
                </div>`;
            app.appendChild(row);
        });

        function autoFillUlt(l) {
            const val = aliasDB[document.getElementById(`champ-${l}`).value] || document.getElementById(`champ-${l}`).value;
            if(championUltDB[val]) {
                [6,11,16].forEach((lvl, i) => document.getElementById(`ultbase-${l}-${lvl}`).value = championUltDB[val][i]);
            }
        }

        function handleSpellClick(l, i) {
            const key = `${l}-${i}`;
            if(activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; document.getElementById(`btn-${l}-${i}`).classList.remove('active'); document.getElementById(`timer-${l}-${i}`).innerText="READY"; return; }
            activeTimers[key] = { id: setInterval(() => {
                const target = getGameTimeSeconds() + spellRegistry[document.getElementById(`select-${l}-${i}`).value];
                const diff = target - getGameTimeSeconds();
                if(diff <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; document.getElementById(`timer-${l}-${i}`).innerText="ON"; }
                else { const t = formatToOrderTime(target); document.getElementById(`btn-${l}-${i}`).innerText=t; document.getElementById(`timer-${l}-${i}`).innerText=t; }
            }, 1000) };
            document.getElementById(`btn-${l}-${i}`).classList.add('active');
        }

        function handleUltClick(l) {
            const key = `${l}-ult`;
            if(activeTimers[key]) { clearInterval(activeTimers[key].id); delete activeTimers[key]; document.getElementById(`btn-${l}-ult`).classList.remove('active'); document.getElementById(`timer-${l}-ult`).innerText="READY"; return; }
            activeTimers[key] = { id: setInterval(() => {
                const lvl = document.querySelector(`input[name="ultlvl-${l}"]:checked`).value;
                const target = getGameTimeSeconds() + parseInt(document.getElementById(`ultbase-${l}-${lvl}`).value);
                const diff = target - getGameTimeSeconds();
                if(diff <= 0) { clearInterval(activeTimers[key].id); delete activeTimers[key]; document.getElementById(`timer-${l}-ult`).innerText="ON"; }
                else { const t = formatToOrderTime(target); document.getElementById(`btn-${l}-ult`).innerText=t; document.getElementById(`timer-${l}-ult`).innerText=t; }
            }, 1000) };
            document.getElementById(`btn-${l}-ult`).classList.add('active');
        }

        function syncGameClock() { gameTimeOffset = parseMMSSToSeconds(document.getElementById('gameClockInput').value); if(gameStartTime) gameStartTime = Date.now(); }
    </script>
</body>
</html>
