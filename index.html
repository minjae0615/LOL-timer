<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롤 스펠 체크</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #0f0f12; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; user-select: none; overflow: hidden; position: relative; }
        
        /* 상단 시간설정 */
        .game-clock-container { position: absolute; top: 10px; left: 15px; background: rgba(20, 20, 25, 0.95); padding: 6px 10px; border-radius: 6px; border: 1px solid #4c4c55; display: flex; align-items: center; gap: 6px; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .game-clock-label { font-size: 11px; color: #ffcd00; font-weight: bold; }
        .game-time-input { width: 55px; background: #25252b; color: #ffcd00; border: 1px solid #666; border-radius: 4px; font-size: 13px; text-align: center; font-weight: bold; padding: 2px; }
        .clock-btn { padding: 3px 8px; font-size: 11px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background: #3d4461; color: #fff; }
        .clock-btn.running { background: #d92b36; }
        .clock-btn.reset { background: #5c6370; color: #fff; border: 1px solid #4b5263; }
        .clock-btn.reset:hover { background: #4b5263; }

        /* 알림 팝업 */
        .left-toast { position: absolute; top: 55px; left: 15px; color: #ff9900; font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.85); padding: 4px 10px; border-radius: 4px; border-left: 4px solid #ff9900; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10; }

        /* 오더 브리핑 전용 대시보드 */
        .order-summary-box { width: 98%; max-width: 860px; background: #1a1a24; border: 1px solid #ffcd00; border-radius: 8px; padding: 8px 12px; margin-bottom: 8px; box-sizing: border-box; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(255, 205, 0, 0.15); }
        .order-summary-title { font-size: 12px; font-weight: bold; color: #ffcd00; background: rgba(255, 205, 0, 0.1); padding: 4px 8px; border-radius: 4px; white-space: nowrap; }
        .order-summary-content { font-size: 14px; font-weight: bold; color: #00ffcc; white-space: nowrap; overflow-x: auto; flex-grow: 1; letter-spacing: 0.5px; }
        .order-summary-content span { margin-right: 15px; background: #252532; padding: 2px 6px; border-radius: 4px; border: 1px solid #3d3d4f; }
        .order-summary-content .empty-msg { color: #666; font-size: 12px; background: none; border: none; }

        /* 레이아웃 */
        .main-wrapper { background-color: #16161a; padding: 8px 12px; border-radius: 12px; border: 1px solid #323238; box-shadow: 0 15px 40px rgba(0,0,0,0.6); width: 98%; max-width: 860px; box-sizing: border-box; }
        .flex-container { display: flex; flex-direction: column; gap: 6px; }
        
        /* 라인별 row */
        .lane-row { display: flex; align-items: center; background-color: #1f1f25; border: 1px solid #3c3c46; border-radius: 6px; padding: 4px 12px; gap: 10px; min-width: 0; }
        .lane-title { width: 45px; font-size: 15px; font-weight: 900; color: #ffcd00; text-align: center; flex-shrink: 0; }
        
        /* 챔피언 검색 */
        .champ-input { width: 85px; padding: 4px; background: #2a2a32; color: #fff; border: 1px solid #5c5c66; border-radius: 4px; font-size: 12px; text-align: center; font-weight: bold; flex-shrink: 0; }
        .champ-input:focus { border-color: #ffcd00; outline: none; }
        
        /* 특성 체크박스 */
        .options { display: flex; flex-direction: column; gap: 2px; font-size: 11px; font-weight: bold; color: #aaa; background: #151519; padding: 4px 6px; border-radius: 4px; width: 75px; flex-shrink: 0; box-sizing: border-box; }
        .options label { display: flex; align-items: center; gap: 3px; cursor: pointer; white-space: nowrap; }
        
        /* 스펠, 궁 박스 */
        .spell-container { display: flex; gap: 6px; flex-grow: 1; align-items: center; min-width: 0; }
        .slot-box { text-align: center; background: #111114; padding: 4px 6px; border-radius: 5px; border: 1px solid #2d2d35; display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
        .ult-box { flex: 1.3; background: #162238; border-color: #354a6b; }
        
        .select-input-group { display: flex; gap: 3px; justify-content: center; width: 100%; }
        .spell-select { width: 100%; padding: 2px; background: #32323a; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 12px; cursor: pointer; min-width: 0; font-weight: bold; }
        .spell-select:disabled { opacity: 0.6; cursor: not-allowed; }
        .ult-cooldown-input { width: 32%; max-width: 38px; padding: 2px 1px; background: #222228; color: #ffcd00; border: 1px solid #555; border-radius: 4px; font-size: 11px; text-align: center; font-weight: bold; }
        
        /* 상단 버튼 (시간 고정) */
        .action-btn { width: 100%; padding: 4px 0; font-size: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background-color: #2e354d; color: #f0e6d2; border: 1px solid #464f73; transition: all 0.1s; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .action-btn:hover { background-color: #3e4766; }
        .action-btn.active { background-color: #c8232c; color: white; border-color: #ff4d52; font-size: 13px; font-weight: 900; }
        .ult-box .action-btn { background-color: #1c3559; border-color: #2b5185; }
        .ult-box .action-btn.active { background-color: #c8232c; border-color: #ff4d52; }
        
        /* 하단 카운트다운 (분:초) */
        .timer-display { font-size: 19px; font-weight: 900; color: #00ffcc; height: 22px; line-height: 22px; text-align: center; white-space: nowrap; letter-spacing: 0.5px; text-shadow: 0 0 6px rgba(0, 255, 204, 0.4); }
        .timer-display.running { font-size: 21px; color: #ff4d52; text-shadow: 0 0 8px rgba(255, 77, 82, 0.5); font-family: 'Courier New', Courier, monospace; }
        
        /* 궁 레벨 라디오 */
        .ult-levels { display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; background: #111115; padding: 2px 4px; border-radius: 4px; width: 100%; box-sizing: border-box; border: 1px solid #2d2d35; }
        .ult-levels label { display: flex; align-items: center; gap: 2px; cursor: pointer; color: #999; }
        .ult-levels input[type="radio"]:checked + span, .ult-levels label:has(input:checked) { color: #ffcd00; }
    </style>
</head>

        // 현재 인게임 초 계산
        function getGameTimeSeconds() {
            if (!gameStartTime) return gameTimeOffset;
            return Math.floor((Date.now() - gameStartTime) / 1000) + gameTimeOffset;
        }

        // 초 -> 00:00 변환
        function formatSecondsToMMSS(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 초 -> 0000 변환 (오더용)
        function formatToOrderTime(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}${s.toString().padStart(2, '0')}`;
        }

        // 00:00 -> 초 변환
        function parseMMSSToSeconds(str) {
            if(str.includes(':')) {
                const parts = str.split(':');
                return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
            }
            return parseInt(str) || 0;
        }

        // 인게임 시계 작동/중지
        function toggleGameClock() {
            const btn = document.getElementById('gameClockToggleBtn');
            if (gameStartTime) {
                gameTimeOffset = getGameTimeSeconds();
                gameStartTime = null;
                clearInterval(gameClockInterval);
                gameClockInterval = null;
                btn.innerText = "시작";
                btn.classList.remove('running');
            } else {
                const inputVal = document.getElementById('gameClockInput').value;
                gameTimeOffset = parseMMSSToSeconds(inputVal);
                gameStartTime = Date.now();
                btn.innerText = "중지";
                btn.classList.add('running');
                gameClockInterval = setInterval(() => {
                    document.getElementById('gameClockInput').value = formatSecondsToMMSS(getGameTimeSeconds());
                }, 1000);
            }
        }

            gameTimeOffset = parseMMSSToSeconds(inputVal);
            if (gameStartTime) gameStartTime = Date.now();
            showLeftToast(`🕒 게임 시간 연동: ${formatSecondsToMMSS(gameTimeOffset)}`);
        }

        function handleClockKeyDown(e) {
            if (e.key === 'Enter') {
                document.getElementById('gameClockInput').blur(); // 포커스를 풀어서 autoSync가 자동 호출되게 만듦
            }
        }

        // 전체 초기화
        function resetAllData() {
            if (gameClockInterval) {
                clearInterval(gameClockInterval);
                gameClockInterval = null;
            }
            gameStartTime = null;
            gameTimeOffset = 0;
            
            const toggleBtn = document.getElementById('gameClockToggleBtn');
            toggleBtn.innerText = "시작";
            toggleBtn.classList.remove('running');
            document.getElementById('gameClockInput').value = "00:00";

            activeTimers = {};
            document.getElementById('orderSummaryContent').innerHTML = '<span class="empty-msg">카운트다운 중인 스펠이 없습니다.</span>';

            lanes.forEach(lane => {
                document.getElementById(`utong-${lane.id}`).checked = false;
                document.getElementById(`shoes-${lane.id}`).checked = false;
                document.getElementById(`champ-${lane.id}`).value = "";

                for (let i = 0; i < 2; i++) {
                    resetTimerUI(lane.id, i);
                }
                resetUltTimerUI(lane.id);
                
                document.getElementById(`ultlvl-${lane.id}-6`).checked = true;
                document.getElementById(`ultbase-${lane.id}-6`).value = 120;
                document.getElementById(`ultbase-${lane.id}-11`).value = 100;
                document.getElementById(`ultbase-${lane.id}-16`).value = 80;
            });

            showLeftToast("🔄 모든 데이터가 초기화되었습니다.");
        }

        // 알림창 띄우기
        function showLeftToast(msg) {
            const t = document.getElementById('leftToast');
            t.innerText = msg; t.style.opacity = '1';
            if(window.ltTimeout) clearTimeout(window.ltTimeout);
            window.ltTimeout = setTimeout(() => t.style.opacity = '0', 2000);
        }

        // 화면 뼈대 생성
        const app = document.getElementById('app');
        lanes.forEach(lane => {
            const row = document.createElement('div');
            row.className = 'lane-row';
            
            let html = `
                <div class="lane-title">${lane.name}</div>
                <input type="text" class="champ-input" id="champ-${lane.id}" placeholder="챔피언 검색" onchange="autoFillUlt('${lane.id}')">
                <div class="options">
                    <label><input type="checkbox" id="utong-${lane.id}"> 우통</label>
                    <label><input type="checkbox" id="shoes-${lane.id}"> 쿨감신</label>
                </div>
                <div class="spell-container">
            `;

            for (let i = 0; i < 2; i++) {
                const defaultSpell = lane.default[i];
                html += `
                    <div class="slot-box">
                        <div class="select-input-group">
                            <select class="spell-select" id="select-${lane.id}-${i}" onchange="onSpellSelectChange('${lane.id}', ${i})">
                                ${Object.keys(spellRegistry).map(name => `<option value="${name}" ${name === defaultSpell ? 'selected' : ''}>${name}</option>`).join('')}
                            </select>
                        </div>
                        <button class="action-btn" id="btn-${lane.id}-${i}" onclick="handleSpellClick('${lane.id}', ${i})">시작</button>
                        <div class="timer-display" id="timer-${lane.id}-${i}">READY</div>
                    </div>
                `;
            }

            html += `
                <div class="slot-box ult-box">
                    <div class="ult-levels">
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-6" value="6" checked><span>6</span></label>
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-11" value="11"><span>11</span></label>
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-16" value="16"><span>16</span></label>
                    </div>
                    <div class="select-input-group">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-6" value="120">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-11" value="100">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-16" value="80">
                    </div>
                    <button class="action-btn" id="btn-${lane.id}-ult" onclick="handleUltClick('${lane.id}')">궁극기</button>
                    <div class="timer-display" id="timer-${lane.id}-ult">READY</div>
                </div>
            `;

            html += `</div>`;
            row.innerHTML = html;
            app.appendChild(row);
            
            onSpellSelectChange(lane.id, 0);
            onSpellSelectChange(lane.id, 1);
        });

        // 스펠/궁 끝나는 인게임 시간 계산
        function getTargetGameTime(laneId, slotIndex, type) {
            if (type === 'spell') {
                const timer = activeTimers[`${laneId}-${slotIndex}`];
                const hasUtong = document.getElementById(`utong-${laneId}`).checked;
                const hasShoes = document.getElementById(`shoes-${laneId}`).checked;
                const finalCooldown = Math.ceil(timer.baseSec * getSpellModifier(hasUtong, hasShoes));
                return timer.triggeredAtGameTime + finalCooldown;
            } else {
                const timer = activeTimers[`${laneId}-ult`];
                let selectedLvl = "6";
                if (document.getElementById(`ultlvl-${laneId}-11`).checked) selectedLvl = "11";
                if (document.getElementById(`ultlvl-${laneId}-16`).checked) selectedLvl = "16";
                const baseSec = parseInt(document.getElementById(`ultbase-${laneId}-${selectedLvl}`).value) || 0;
                const hasShoes = document.getElementById(`shoes-${laneId}`).checked;
                const finalCooldown = Math.ceil(baseSec * getUltModifier(hasShoes));
                return timer.triggeredAtGameTime + finalCooldown;
            }
        }

        // 챔피언 치면 궁 쿨타임 자동 입력
        function autoFillUlt(laneId) {
            const inputField = document.getElementById(`champ-${laneId}`);
            let inputVal = inputField.value.trim().toLowerCase();
            
            if(!inputVal) return;

            if (aliasDB[inputVal]) {
                inputVal = aliasDB[inputVal];
                inputField.value = inputVal;
            }

            if (championUltDB[inputVal]) {
                const cooldowns = championUltDB[inputVal];
                document.getElementById(`ultbase-${laneId}-6`).value = cooldowns[0];
                document.getElementById(`ultbase-${laneId}-11`).value = cooldowns[1];
                document.getElementById(`ultbase-${laneId}-16`).value = cooldowns[2];
            }
        }

        // 셀렉트 박스 바꿀 때 버튼 글자 변경
        function onSpellSelectChange(laneId, slotIndex) {
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            if (!activeTimers[`${laneId}-${slotIndex}`]) {
                btn.innerText = select.value;
            }
        }

        // 스펠 쿨감 계산용 비율
        function getSpellModifier(hasUtong, hasShoes) {
            let speed = 0;
            if (hasUtong) speed += 18;
            if (hasShoes) speed += 12;
            return 100 / (100 + speed);
        }

        // 궁 쿨감 계산용 비율
        function getUltModifier(hasShoes) {
            let speed = 0;
            if (hasShoes) speed += 15;
            return 100 / (100 + speed);
        }

        // 브라우저 TTS 음성 안내 시스템
        function playVoiceAlert(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'ko-KR';
                utterance.rate = 1.1; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // 스펠 클릭 시 타이머 시작/리셋
        function handleSpellClick(laneId, slotIndex) {
            const timerKey = `${laneId}-${slotIndex}`;
            if (activeTimers[timerKey]) { 
                resetTimer(laneId, slotIndex); 
                return; 
            }
            
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            const currentSeconds = getGameTimeSeconds();
            
            activeTimers[timerKey] = {
                type: 'spell',
                lane: laneId,
                name: select.value,
                baseSec: spellRegistry[select.value],
                triggeredAtGameTime: currentSeconds,
                playedAlert: false 
            };
            
            select.disabled = true;

            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            btn.classList.add('active');
            
            const targetGameTime = getTargetGameTime(laneId, slotIndex, 'spell');
            btn.innerText = formatToOrderTime(targetGameTime);
        }

        // 궁 클릭 시 타이머 시작/리셋
        function handleUltClick(laneId) {
            const timerKey = `${laneId}-ult`;
            if (activeTimers[timerKey]) { 
                resetUltTimer(laneId); 
                return; 
            }

            const currentSeconds = getGameTimeSeconds();
            activeTimers[timerKey] = {
                type: 'ult',
                lane: laneId,
                name: '궁극기',
                triggeredAtGameTime: currentSeconds,
                playedAlert: false 
            };

            const btn = document.getElementById(`btn-${laneId}-ult`);
            btn.classList.add('active');

            const targetGameTime = getTargetGameTime(laneId, null, 'ult');
            btn.innerText = formatToOrderTime(targetGameTime);
        }

        // 매초 실시간 업뎃
        setInterval(() => {
            const currentSeconds = getGameTimeSeconds();
            let summaryList = [];

            Object.keys(activeTimers).forEach(key => {
                const timer = activeTimers[key];
                const parts = key.split('-');
                const laneId = parts[0];
                const type = parts[1]; 

                const display = document.getElementById(`timer-${laneId}-${type}`);
                const btn = document.getElementById(`btn-${laneId}-${type}`);
                if(!display || !btn) return;
                
                let targetGameTime = 0;
                if (type === 'ult') {
                    targetGameTime = getTargetGameTime(laneId, null, 'ult');
                } else {
                    targetGameTime = getTargetGameTime(laneId, parseInt(type), 'spell');
                }

                const timeLeft = targetGameTime - currentSeconds;

                if (timeLeft <= 0) {
                    if (type === 'ult') resetUltTimer(laneId);
                    else resetTimer(laneId, parseInt(type));
                } else {
                    btn.innerText = formatToOrderTime(targetGameTime); 
                    display.innerText = formatSecondsToMMSS(timeLeft); 
                    display.classList.add('running');

                    if (timeLeft <= 20 && !timer.playedAlert) {
                        playVoiceAlert(`${timer.lane} ${timer.name} 이십초 전`);
                        timer.playedAlert = true;
                    }

                    summaryList.push({
                        lane: timer.lane,
                        name: timer.name,
                        targetTimeStr: formatToOrderTime(targetGameTime),
                        targetSec: targetGameTime
                    });
                }
            });

            const summaryBox = document.getElementById('orderSummaryContent');
            if (summaryList.length > 0) {
                summaryList.sort((a, b) => a.targetSec - b.targetSec);
                summaryBox.innerHTML = summaryList.map(item => {
                    let shortName = item.name;
                    if(shortName === '텔포') shortName = '텔';
                    if(shortName === '궁극기') shortName = '궁';
                    return `<span>${item.lane} ${shortName} ${item.targetTimeStr}</span>`;
                }).join('');
            } else {
                summaryBox.innerHTML = '<span class="empty-msg">카운트다운 중인 스펠이 없습니다.</span>';
            }
        }, 1000);

        // 스펠 타이머 리셋
        function resetTimer(laneId, slotIndex) {
            delete activeTimers[`${laneId}-${slotIndex}`];
            resetTimerUI(laneId, slotIndex);
        }

        // 스펠 UI 원상복구
        function resetTimerUI(laneId, slotIndex) {
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            if(select) select.disabled = false;

            const btn = document.getElementById('btn-' + laneId + '-' + slotIndex);
            if(btn) btn.classList.remove('active');
            
            const display = document.getElementById('timer-' + laneId + '-' + slotIndex);
            if(display) {
                display.innerText = "READY";
                display.classList.remove('running');
            }
            onSpellSelectChange(laneId, slotIndex);
        }

        // 궁 타이머 리셋
        function resetUltTimer(laneId) {
            delete activeTimers[`${laneId}-ult`];
            resetUltTimerUI(laneId);
        }

        // 궁 UI 원상복구
        function resetUltTimerUI(laneId) {
            const btn = document.getElementById(`btn-${laneId}-ult`);
            if(btn) {
                btn.classList.remove('active');
                btn.innerText = "궁극기";
            }
            const display = document.getElementById(`timer-${laneId}-ult`);
            if(display) {
                display.innerText = "READY";
                display.classList.remove('running');
            }
        }
    </script>
</body>
</html>
