    <title>롤 스펠 체크 - 프로 매치 에디션</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #0b0b0e; }
        body { font-family: 'Malgun Gothic', sans-serif; color: #f0e6d2; display: flex; flex-direction: column; justify-content: center; align-items: center; user-select: none; overflow: hidden; position: relative; }
        
        /* 상단 시간설정 및 옵션 */
        .game-clock-container { position: absolute; top: 10px; left: 15px; background: rgba(26, 26, 31, 0.95); padding: 6px 12px; border-radius: 6px; border: 1px solid #43434d; display: flex; align-items: center; gap: 12px; z-index: 20; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .game-clock-label { font-size: 11px; color: #c8aa6e; font-weight: bold; letter-spacing: 0.5px; }
        .game-time-input { width: 55px; background: #1a1a22; color: #c8aa6e; border: 1px solid #5b5b66; border-radius: 4px; font-size: 13px; text-align: center; font-weight: bold; padding: 2px; }
        .clock-btn { padding: 3px 8px; font-size: 11px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background: #323a4e; color: #f0e6d2; border: 1px solid #46526e; }
        .clock-btn.running { background: #785a28; border-color: #c8aa6e; color: #fff; }
        .clock-btn.reset { background: #495057; color: #fff; border: 1px solid #5a6268; }
        .clock-btn.reset:hover { background: #5a6268; }

        /* 음성 컨트롤 영역 */
        .voice-control-group { display: flex; align-items: center; gap: 10px; border-left: 1px solid #43434d; padding-left: 12px; margin-left: 4px; }
        .voice-opt-label { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #c89b3c; font-weight: bold; cursor: pointer; }
        .voice-opt-label input { cursor: pointer; margin: 0; }
        
        /* 볼륨 조절 슬라이더 */
        .volume-container { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #a0957f; font-weight: bold; }
        .volume-slider { width: 70px; accent-color: #c8aa6e; cursor: pointer; height: 4px; background: #323a4e; border-radius: 2px; outline: none; }
        .volume-text { width: 28px; text-align: right; font-family: monospace; color: #c8aa6e; }

        /* 알림 팝업 */
        .left-toast { position: absolute; top: 55px; left: 15px; color: #c8aa6e; font-size: 12px; font-weight: bold; background: rgba(10,10,15,0.9); padding: 4px 10px; border-radius: 4px; border-left: 4px solid #c8aa6e; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10; }

        /* 레이아웃 구조 (좌측 정렬 최적화) */
        .layout-container { display: flex; align-items: stretch; gap: 16px; width: 99%; max-width: 1400px; box-sizing: border-box; padding-left: 5px; }

        /* 좌측 메인판 */
        .main-wrapper { background-color: #121217; padding: 10px; border-radius: 12px; border: 1px solid #262631; box-shadow: 0 15px 40px rgba(0,0,0,0.7); flex: 2.1; min-width: 0; box-sizing: border-box; }
        .flex-container { display: flex; flex-direction: column; gap: 10px; }
        
        /* 우측 이원화 브리핑 컨테이너 영역 */
        .right-briefing-zone { flex: 1.9; display: flex; gap: 12px; min-width: 520px; box-sizing: border-box; }
        
        /* 우측 각각의 오더 브리핑 보드 스타일 */
        .order-summary-box { flex: 1; background: #111115; border: 2px solid #3c3c4d; border-radius: 12px; padding: 14px; box-sizing: border-box; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.5); }
        .order-summary-box.spell-box-border { border-color: #4a5a73; }
        .order-summary-box.ult-box-border { border-color: #7d5b38; }
        
        .order-summary-title { font-size: 16px; font-weight: 900; text-align: center; letter-spacing: 0.5px; padding: 8px; border-radius: 4px; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .spell-box-border .order-summary-title { color: #8ba2c4; background: rgba(139, 162, 196, 0.08); }
        .ult-box-border .order-summary-title { color: #c8aa6e; background: rgba(200, 170, 110, 0.08); }
        
        .order-summary-content { font-size: 16px; font-weight: bold; color: #f0e6d2; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        /* 브리핑 아이템 스타일 및 애니메이션 효과 (글자 대폭 확대 및 테두리 부여) */
        .order-item { display: flex; justify-content: space-between; align-items: center; background: #13131a; padding: 11px 14px; border-radius: 6px; box-sizing: border-box; }
        .order-item .item-text { font-size: 18px; font-weight: 900; letter-spacing: 0.5px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .order-item .item-time { font-size: 20px; color: #ffffff; font-family: 'Courier New', monospace; font-weight: 900; background: rgba(0,0,0,0.7); padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); text-shadow: 0 0 5px #fff; }
        .order-summary-content .empty-msg { color: #5b5b66; font-size: 14px; background: none; border: none; text-align: center; padding-top: 80px; line-height: 1.6; font-weight: normal; }

        /* 라인별 행 디자인 (테두리 두께 강화) */
        .lane-row { display: flex; align-items: center; background-color: #16161f; border: 2px solid #2a2a38; border-radius: 8px; padding: 6px 12px; gap: 10px; min-width: 0; }
        .lane-title { width: 50px; font-size: 16px; font-weight: 900; text-align: center; flex-shrink: 0; letter-spacing: 0.5px; padding: 4px 0; border-radius: 4px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        
        /* 🎨 image_b819fb.png 기반 가독성 최적화 디자인 */

        /* 기본 설정 */
        .lane-row { 
            background-color: #0b0b0e; 
            border: 2px solid #2a2a38; 
            border-radius: 8px; 
            padding: 6px 12px; 
        }
        
        /* 탑: 에메랄드 그린 (#00A86B) - 눈 피로 최소화 */
        .lane-row.lane-top { border-color: #00A86B; }
        .lane-row.lane-top .lane-title { background-color: #00A86B; color: #000; font-weight: bold; }

        /* 정글: 딥 마젠타 (#C2185B) - 다른 색과 충돌 없음 */
        .lane-row.lane-jgl { border-color: #C2185B; }
        .lane-row.lane-jgl .lane-title { background-color: #C2185B; color: #fff; font-weight: bold; }

        /* 미드: 로열 블루 (#0057FF) - 강력한 기본 대비 */
        .lane-row.lane-mid { border-color: #0057FF; }
        .lane-row.lane-mid .lane-title { background-color: #0057FF; color: #fff; font-weight: bold; }
        
        /* 원딜: 비비드 오렌지 (#FF7A00) - 파랑(미드)과 극강의 분리 */
        .lane-row.lane-adc { border-color: #FF7A00; }
        .lane-row.lane-adc .lane-title { background-color: #FF7A00; color: #000; font-weight: bold; }
        
        /* 서폿: 골드 옐로 (#FFD600) - 즉시 시선 유도 */
        .lane-row.lane-sup { border-color: #FFD600; }
        .lane-row.lane-sup .lane-title { background-color: #FFD600; color: #000; font-weight: bold; }

        /* 챔피언 검색 */
        .champ-input { width: 85px; padding: 5px; background: #22222b; color: #fff; border: 1px solid #444452; border-radius: 4px; font-size: 13px; text-align: center; font-weight: bold; flex-shrink: 0; }
        .champ-input:focus { border-color: #c8aa6e; outline: none; }
        
        /* 특성 체크박스 */
        .options { display: flex; flex-direction: column; gap: 4px; font-size: 12px; font-weight: bold; color: #aaa; background: #0d0d12; padding: 6px 8px; border-radius: 4px; width: 75px; flex-shrink: 0; box-sizing: border-box; border: 1px solid #222; }
        .options label { display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap; }
        .options input[type="checkbox"] { transform: scale(1.1); margin: 0; cursor: pointer; }
        
        /* 스펠 및 궁 슬롯 */
        .spell-container { display: flex; gap: 8px; flex-grow: 1; align-items: center; min-width: 0; }
        .slot-box { text-align: center; background: #0e0e12; padding: 5px 6px; border-radius: 6px; border: 1px solid #252533; display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
        .ult-box { flex: 1.2; background: #121926; border-color: #24354f; }
        
        .select-input-group { display: flex; gap: 3px; justify-content: center; width: 100%; }
        .spell-select { width: 100%; padding: 3px; background: #282830; color: #f0e6d2; border: 1px solid #444; border-radius: 4px; font-size: 13px; cursor: pointer; min-width: 0; font-weight: bold; text-align: center; }
        .spell-select:disabled { opacity: 0.5; cursor: not-allowed; }
        .ult-cooldown-input { width: 32%; max-width: 38px; padding: 2px 1px; background: #181822; color: #c8aa6e; border: 1px solid #444; border-radius: 4px; font-size: 11px; text-align: center; font-weight: bold; }
        
        /* 버튼 디자인 */
        .action-btn { width: 100%; padding: 5px 0; font-size: 13px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; background-color: #1e232a; color: #a0957f; border: 1px solid #3c3c41; transition: all 0.1s; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .action-btn:hover { background-color: #2a3039; color: #f0e6d2; }
        .action-btn.active { background-color: #5b1a1e; color: #ff9999; border-color: #8c2d32; font-size: 13px; font-weight: bold; }
        .ult-box .action-btn { background-color: #1a2436; border-color: #293850; color: #8ba2c4; }
        .ult-box .action-btn.active { background-color: #5b1a1e; border-color: #8c2d32; color: #ff9999; }
        
        /* 메인 판 타이머 텍스트 색상 */
        .timer-display { font-size: 19px; font-weight: bold; color: #00ff66; height: 24px; line-height: 24px; text-align: center; white-space: nowrap; letter-spacing: 0.5px; }
        .timer-display.running { color: #ff9900; font-family: 'Courier New', Courier, monospace; font-weight: 900; text-shadow: 0 0 3px rgba(255,153,0,0.5); }
        
        /* 궁 레벨 선택 */
        .ult-levels { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold; background: #09090d; padding: 2px 4px; border-radius: 4px; width: 100%; box-sizing: border-box; border: 1px solid #22222a; }
        .ult-levels label { display: flex; align-items: center; gap: 2px; cursor: pointer; color: #666; }
        .ult-levels input[type="radio"]:checked + span, .ult-levels label:has(input:checked) { color: #c8aa6e; }
        
        /* [수정 및 추가된 스타일] */
        
        /* 1. 전체 배경 및 글자 색상 최적화 */
        body { 
            background-color: #0b0b0e !important; /* 배경 어둡게 */
            color: #e0e0e0 !important; /* 글자 밝은 회색으로 변경 */
        }

        /* 2. 00:00 시간 표기 디자인 */
        .timer-display { 
            font-family: 'Consolas', monospace !important; /* 숫자 가독성 폰트 */
            font-size: 16px !important; 
            font-weight: 900 !important; 
            color: #ffffff !important; /* 완전한 흰색 */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5) !important; /* 눈에 띄게 빛 번짐 효과 */

        .lane-TOP { border: 2px solid #00A86B !important; }
        .lane-JGL { border: 2px solid #C2185B !important; }
        .lane-MID { border: 2px solid #0057FF !important; }
        .lane-ADC { border: 2px solid #FF7A00 !important; }
        .lane-SUP { border: 2px solid #FFD600 !important; }
    </style>
</head>

            '트린': '트린다미어', '트페': '트위스티드페이트', 'tf': '트위스티드페이트', '갱플': '갱플랭크', 'gp': '갱플랭크',
            '그라': '그라가스', '그브': '그레이브즈', '노틸': '노틸러스', '녹턴': '녹턴', '다리': '다리우스', '다이': '다이애나',
            '드레': '드레이븐', '레오': '레오나', '레넥': '레넥톤', '르블': '르블랑', '리산': '리산드라', '마이': '마스터이', 
            '마오': '마오카이', '말자': '말자하', '말파': '말파이트', '모데': '모데카이저', '모르': '모르가나', '문도': '문도박사', 
            '미포': '미스포츈', '바드': '바드', '바루': '바루스', '베이': '베이가', '볼리': '볼리베어', '브라움': '브라움', '빅토': '빅토르', 
            '사이': '사이온', '사일': '사일러스', '세라': '세라핀', '세주': '세주아니', '소라': '소라카', '스웨': '스웨인', 
            '스카': '스카너', '시비': '시비르', '짜오': '신짜오', '신짜': '신짜오', '신드': '신드라', '쓰레': '쓰레쉬', 
            '아솔': '아우렐리온솔', '아지': '아지르', '아칼': '아칼리', '아크': '아크샨', '아트': '아트록스', '아펠': '아펠리오스', 
            '알리': '알리스타', '애니': '애니비아', '오리': '오리아나', '올라': '오라프', '요네': '요네', '요릭': '요릭', '우고': '우고트', '이렐': '이렐리아', 
            '이브': '이브린', '이지': '이지리얼', '일라': '일라오이', '자르': '자르반', '자이': '자이라', '제라': '제라스', 
            '제이': '제이스', '질리': '질리언', '징크': '징크스', '초가스': '초가스', '카사': '카사딘', '카시': '카시오페아', 
            '카이': '카이사', '카직': '카직스', '카타': '카타리나', '칼리': '칼리스타', '케넨': '케넨', '케틀': '케이틀린', 
            '코그': '코그모', '코르': '코르키', '클레': '클레드', '키아': '키아나', '킨드': '킨드레드', '탐켄': '탐켄치', 
            '트런': '트런들', '트리': '트리스타나', '트위': '트위치', '파이': '파이크', '판테': '판테온', '피들': '피들스틱', 
            '피오': '피오라', '하이': '하이머딩거', '헤카': '헤카림', '블라': '블라디미르'
        };

        const spellRegistry = {
            '점멸': 300, '텔포': 360, '점화': 180, '탈진': 210, 
            '정화': 210, '방어막': 180, '회복': 240, '유체화': 240, '강타': 90
        };

        const lanes = [
            { id: 'TOP', name: '탑', cssClass: 'lane-top', default: ['텔포', '점멸'] },
            { id: 'JGL', name: '정글', cssClass: 'lane-jgl', default: ['강타', '점멸'] },
            { id: 'MID', name: '미드', cssClass: 'lane-mid', default: ['텔포', '점멸'] },
            { id: 'ADC', name: '원딜', cssClass: 'lane-adc', default: ['방어막', '점멸'] },
            { id: 'SUP', name: '서폿', cssClass: 'lane-sup', default: ['점화', '점멸'] }
        ];

        // 🎨 [레이더 고대비 컬러 매트릭스] 명도와 색상 각도를 완전히 찢어놓은 알잘딱 버전
        const laneColors = {
            '탑': '#00ff66',   // 형광 네온 그린
            '정글': '#ff00ff', // 강렬한 마젠타 핫핑크
            '미드': '#00ffff',  // 얼음빛 네온 시안 블루
            '원딜': '#ff3333',  // 고광도 강렬한 레드
            '서폿': '#ffff00'   // 쨍한 선명 노란색
        };

        let activeTimers = {};

        function getGameTimeSeconds() {
            if (!gameStartTime) return gameTimeOffset;
            return Math.floor((Date.now() - gameStartTime) / 1000) + gameTimeOffset;
        }

        function formatSecondsToMMSS(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function formatToOrderTime(totalSeconds) {
            if (totalSeconds < 0) totalSeconds = 0;
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            return `${m.toString().padStart(2, '0')}${s.toString().padStart(2, '0')}`;
        }

        function parseMMSSToSeconds(str) {
            if(str.includes(':')) {
                const parts = str.split(':');
                return (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0);
            }
            return parseInt(str) || 0;
        }

        function toggleGameClock() {
            const btn = document.getElementById('gameClockToggleBtn');
            if (gameStartTime) {
                gameTimeOffset = getGameTimeSeconds();
                gameStartTime = null;
                clearInterval(gameClockInterval);
                gameClockInterval = null;
                btn.innerText = "시작";
                btn.classList.remove('running');
            } else {
                const inputVal = document.getElementById('gameClockInput').value;
                gameTimeOffset = parseMMSSToSeconds(inputVal);
                gameStartTime = Date.now();
                btn.innerText = "중지";
                btn.classList.add('running');
                gameClockInterval = setInterval(() => {
                    document.getElementById('gameClockInput').value = formatSecondsToMMSS(getGameTimeSeconds());
                }, 1000);
            }
        }

        function autoSyncGameClock() {
            const inputVal = document.getElementById('gameClockInput').value;
            gameTimeOffset = parseMMSSToSeconds(inputVal);
            if (gameStartTime) gameStartTime = Date.now();
            showLeftToast(`🕒 게임 시간 연동: ${formatSecondsToMMSS(gameTimeOffset)}`);
        }

        function handleClockKeyDown(e) {
            if (e.key === 'Enter') {
                document.getElementById('gameClockInput').blur();
            }
        }

        function updateVolumeText() {
            const vol = document.getElementById('voiceVolume').value;
            document.getElementById('volumeVal').innerText = `${vol}%`;
        }

        function onVoiceToggleChange() {
            const isEnabled = document.getElementById('voiceAlertToggle').checked;
            if(isEnabled) {
                showLeftToast("🔊 음성 알림이 활성화되었습니다.");
                const dummy = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(dummy);
            } else {
                showLeftToast("🔇 음성 알림이 비활성화되었습니다.");
            }
        }

        function resetAllData() {
            if (gameClockInterval) {
                clearInterval(gameClockInterval);
                gameClockInterval = null;
            }
            gameStartTime = null;
            gameTimeOffset = 0;
            
            const toggleBtn = document.getElementById('gameClockToggleBtn');
            toggleBtn.innerText = "시작";
            toggleBtn.classList.remove('running');
            document.getElementById('gameClockInput').value = "00:00";

            activeTimers = {};
            updateDualSummaryView([], []);

            lanes.forEach(lane => {
                document.getElementById(`utong-${lane.id}`).checked = false;
                document.getElementById(`shoes-${lane.id}`).checked = false;
                document.getElementById(`champ-${lane.id}`).value = "";

                for (let i = 0; i < 2; i++) {
                    resetTimerUI(lane.id, i);
                }
                resetUltTimerUI(lane.id);
                
                document.getElementById(`ultlvl-${lane.id}-6`).checked = true;
                document.getElementById(`ultbase-${lane.id}-6`).value = 120;
                document.getElementById(`ultbase-${lane.id}-11`).value = 100;
                document.getElementById(`ultbase-${lane.id}-16`).value = 80;
            });

            showLeftToast("🔄 모든 데이터가 초기화되었습니다.");
        }

        function showLeftToast(msg) {
            const t = document.getElementById('leftToast');
            t.innerText = msg; t.style.opacity = '1';
            if(window.ltTimeout) clearTimeout(window.ltTimeout);
            window.ltTimeout = setTimeout(() => t.style.opacity = '0', 2000);
        }

        // 레이아웃 동적 생성기
        const app = document.getElementById('app');
        lanes.forEach(lane => {
            const row = document.createElement('div');
            row.className = `lane-row ${lane.cssClass}`;
            
            let html = `
                <div class="lane-title">${lane.name}</div>
                <input type="text" class="champ-input" id="champ-${lane.id}" placeholder="챔피언 검색" onchange="autoFillUlt('${lane.id}')">
                <div class="options">
                    <label><input type="checkbox" id="utong-${lane.id}"> 우통</label>
                    <label><input type="checkbox" id="shoes-${lane.id}"> 쿨감신</label>
                </div>
                <div class="spell-container">
            `;

            for (let i = 0; i < 2; i++) {
                const defaultSpell = lane.default[i];
                html += `
                    <div class="slot-box">
                        <div class="select-input-group">
                            <select class="spell-select" id="select-${lane.id}-${i}" onchange="onSpellSelectChange('${lane.id}', ${i})">
                                ${Object.keys(spellRegistry).map(name => `<option value="${name}" ${name === defaultSpell ? 'selected' : ''}>${name}</option>`).join('')}
                            </select>
                        </div>
                        <button class="action-btn" id="btn-${lane.id}-${i}" onclick="handleSpellClick('${lane.id}', ${i})">시작</button>
                        <div class="timer-display" id="timer-${lane.id}-${i}">READY</div>
                    </div>
                `;
            }

            html += `
                <div class="slot-box ult-box">
                    <div class="ult-levels">
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-6" value="6" checked><span>6</span></label>
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-11" value="11"><span>11</span></label>
                        <label><input type="radio" name="ultlvl-${lane.id}" id="ultlvl-${lane.id}-16" value="16"><span>16</span></label>
                    </div>
                    <div class="select-input-group">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-6" value="120">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-11" value="100">
                        <input type="number" class="ult-cooldown-input" id="ultbase-${lane.id}-16" value="80">
                    </div>
                    <button class="action-btn" id="btn-${lane.id}-ult" onclick="handleUltClick('${lane.id}')">궁극기</button>
                    <div class="timer-display" id="timer-${lane.id}-ult">READY</div>
                </div>
            `;

            html += `</div>`;
            row.innerHTML = html;
            app.appendChild(row);
            
            onSpellSelectChange(lane.id, 0);
            onSpellSelectChange(lane.id, 1);
        });

        function getTargetGameTime(laneId, slotIndex, type) {
            if (type === 'spell') {
                const timer = activeTimers[`${laneId}-${slotIndex}`];
                const hasUtong = document.getElementById(`utong-${laneId}`).checked;
                const hasShoes = document.getElementById(`shoes-${laneId}`).checked;
                const finalCooldown = Math.ceil(timer.baseSec * getSpellModifier(hasUtong, hasShoes));
                return timer.triggeredAtGameTime + finalCooldown;
            } else {
                const timer = activeTimers[`${laneId}-ult`];
                let selectedLvl = "6";
                if (document.getElementById(`ultlvl-${laneId}-11`).checked) selectedLvl = "11";
                if (document.getElementById(`ultlvl-${laneId}-16`).checked) selectedLvl = "16";
                const baseSec = parseInt(document.getElementById(`ultbase-${laneId}-${selectedLvl}`).value) || 0;
                const hasShoes = document.getElementById(`shoes-${laneId}`).checked;
                const finalCooldown = Math.ceil(baseSec * getUltModifier(hasShoes));
                return timer.triggeredAtGameTime + finalCooldown;
            }
        }

        function autoFillUlt(laneId) {
            const inputField = document.getElementById(`champ-${laneId}`);
            let inputVal = inputField.value.trim().toLowerCase();
            if(!inputVal) return;

            if (aliasDB[inputVal]) {
                inputVal = aliasDB[inputVal];
                inputField.value = inputVal;
            }

            if (championUltDB[inputVal]) {
                const cooldowns = championUltDB[inputVal];
                document.getElementById(`ultbase-${laneId}-6`).value = cooldowns[0];
                document.getElementById(`ultbase-${laneId}-11`).value = cooldowns[1];
                document.getElementById(`ultbase-${laneId}-16`).value = cooldowns[2];
            }
        }

        function onSpellSelectChange(laneId, slotIndex) {
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            if (!activeTimers[`${laneId}-${slotIndex}`]) {
                btn.innerText = select.value;
            }
        }

        function getSpellModifier(hasUtong, hasShoes) {
            let speed = 0;
            if (hasUtong) speed += 18;
            if (hasShoes) speed += 12;
            return 100 / (100 + speed);
        }

        function getUltModifier(hasShoes) {
            let speed = 0;
            if (hasShoes) speed += 15;
            return 100 / (100 + speed);
        }

        function speakOrderText(text) {
            const isVoiceEnabled = document.getElementById('voiceAlertToggle').checked;
            if (!isVoiceEnabled) return; 

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';

            const volumeSliderVal = parseInt(document.getElementById('voiceVolume').value) || 0;
            utterance.volume = volumeSliderVal / 100;
            utterance.rate = 1.05; 
            window.speechSynthesis.speak(utterance);
        }

        function handleSpellClick(laneId, slotIndex) {
            const timerKey = `${laneId}-${slotIndex}`;
            if (activeTimers[timerKey]) { 
                resetTimer(laneId, slotIndex); 
                return; 
            }
            
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            const currentSeconds = getGameTimeSeconds();
            
            const targetLaneObj = lanes.find(l => l.id === laneId);
            const krName = targetLaneObj ? targetLaneObj.name : laneId;

            activeTimers[timerKey] = {
                type: 'spell',
                lane: laneId,
                laneKr: krName,
                name: select.value,
                baseSec: spellRegistry[select.value],
                triggeredAtGameTime: currentSeconds,
                playedAlert: false 
            };
            
            select.disabled = true;
            const btn = document.getElementById(`btn-${laneId}-${slotIndex}`);
            btn.classList.add('active');
            
            const targetGameTime = getTargetGameTime(laneId, slotIndex, 'spell');
            btn.innerText = formatToOrderTime(targetGameTime);
        }

        function handleUltClick(laneId) {
            const timerKey = `${laneId}-ult`;
            if (activeTimers[timerKey]) { 
                resetUltTimer(laneId); 
                return; 
            }

            const currentSeconds = getGameTimeSeconds();
            const targetLaneObj = lanes.find(l => l.id === laneId);
            const krName = targetLaneObj ? targetLaneObj.name : laneId;

            activeTimers[timerKey] = {
                type: 'ult',
                lane: laneId,
                laneKr: krName,
                name: '궁극기',
                triggeredAtGameTime: currentSeconds,
                playedAlert: false 
            };

            const btn = document.getElementById(`btn-${laneId}-ult`);
            btn.classList.add('active');

            const targetGameTime = getTargetGameTime(laneId, null, 'ult');
            btn.innerText = formatToOrderTime(targetGameTime);
        }

        // 📊 개별 네온 하이라이팅 + 그림자 레이어 시스템 탑재
        function updateDualSummaryView(spellList, ultList) {
            const spellBox = document.getElementById('spellSummaryContent');
            const ultBox = document.getElementById('ultSummaryContent');
            
            // 1. 스펠 브리핑 전용 칸 렌더링
            if (spellList.length === 0) {
                spellBox.innerHTML = '<div class="empty-msg">카운트다운 중인<br>스펠이 없습니다.</div>';
            } else {
                spellBox.innerHTML = spellList.map(item => {
                    const clr = laneColors[item.laneKr] || '#ffffff';
                    return `
                        <div class="order-item" id="order-node-${item.key}" style="border: 2px solid ${clr}; box-shadow: 0 0 8px ${clr}55, inset 0 0 4px ${clr}22;">
                            <span class="item-text" style="color: ${clr};">${item.laneKr} ${item.shortName}</span>
                            <span class="item-time" style="border-color: ${clr}aa;">${item.targetTimeStr}</span>
                        </div>
                    `;
                }).join('');
            }

            // 2. 궁극기 브리핑 전용 칸 렌더링
            if (ultList.length === 0) {
                ultBox.innerHTML = '<div class="empty-msg">카운트다운 중인<br>궁극기가 없습니다.</div>';
            } else {
                ultBox.innerHTML = ultList.map(item => {
                    const clr = laneColors[item.laneKr] || '#ffffff';
                    return `
                        <div class="order-item" id="order-node-${item.key}" style="border: 2px solid ${clr}; box-shadow: 0 0 8px ${clr}55, inset 0 0 4px ${clr}22;">
                            <span class="item-text" style="color: ${clr};">${item.laneKr} ${item.shortName}</span>
                            <span class="item-time" style="border-color: ${clr}aa;">${item.targetTimeStr}</span>
                        </div>
                    `;
                }).join('');
            }
        }

        // 엔진 주기적 클락 루프
        setInterval(() => {
            const currentSeconds = getGameTimeSeconds();
            let spellSummary = [];
            let ultSummary = [];

            Object.keys(activeTimers).forEach(key => {
                const timer = activeTimers[key];
                const parts = key.split('-');
                const laneId = parts[0];
                const type = parts[1]; 

                const display = document.getElementById(`timer-${laneId}-${type}`);
                const btn = document.getElementById(`btn-${laneId}-${type}`);
                if(!display || !btn) return;
                
                let targetGameTime = 0;
                if (type === 'ult') {
                    targetGameTime = getTargetGameTime(laneId, null, 'ult');
                } else {
                    targetGameTime = getTargetGameTime(laneId, parseInt(type), 'spell');
                }

                const timeLeft = targetGameTime - currentSeconds;

                if (timeLeft <= 0) {
                    if (type === 'ult') resetUltTimer(laneId);
                    else resetTimer(laneId, parseInt(type));
                } else {
                    btn.innerText = formatToOrderTime(targetGameTime); 
                    display.innerText = formatSecondsToMMSS(timeLeft); 
                    display.classList.add('running');

                    let shortName = timer.name;
                    if(shortName === '텔포') shortName = '텔';
                    if(shortName === '궁극기') shortName = '궁';

                    if (timeLeft <= 20 && !timer.playedAlert) {
                        const spellTxt = (timer.name === '궁극기') ? '궁' : timer.name;
                        speakOrderText(`${timer.laneKr} ${spellTxt} 이십초 전`);
                        timer.playedAlert = true;
                    }

                    const pushData = {
                        key: key,
                        laneId: laneId,
                        laneKr: timer.laneKr,
                        shortName: shortName,
                        targetTimeStr: formatToOrderTime(targetGameTime),
                        targetSec: targetGameTime
                    };

                    if(type === 'ult') {
                        ultSummary.push(pushData);
                    } else {
                        spellSummary.push(pushData);
                    }
                }
            });

            spellSummary.sort((a, b) => a.targetSec - b.targetSec);
            ultSummary.sort((a, b) => a.targetSec - b.targetSec);
            
            updateDualSummaryView(spellSummary, ultSummary);
        }, 1000);

        function resetTimer(laneId, slotIndex) {
            delete activeTimers[`${laneId}-${slotIndex}`];
            resetTimerUI(laneId, slotIndex);
        }

        function resetTimerUI(laneId, slotIndex) {
            const select = document.getElementById(`select-${laneId}-${slotIndex}`);
            if(select) select.disabled = false;

            const btn = document.getElementById('btn-' + laneId + '-' + slotIndex);
            if(btn) btn.classList.remove('active');
            
            const display = document.getElementById('timer-' + laneId + '-' + slotIndex);
            if(display) {
                display.innerText = "READY";
                display.classList.remove('running');
            }
            onSpellSelectChange(laneId, slotIndex);
        }

        function resetUltTimer(laneId) {
            delete activeTimers[`${laneId}-ult`];
            resetUltTimerUI(laneId);
        }

        function resetUltTimerUI(laneId) {
            const btn = document.getElementById(`btn-${laneId}-ult`);
            if(btn) {
                btn.classList.remove('active');
                btn.innerText = "궁극기";
            }
            const display = document.getElementById(`timer-${laneId}-ult`);
            if(display) {
                display.innerText = "READY";
                display.classList.remove('running');
            }
        }
    </script>
</body>
</html>
